openapi: 3.0.1
info:
  title: Chat Service API
  description: OpenAPI specification for the Chat Service endpoint.
  version: 1.0.0
servers:
- url: "{server}:{port}/adjudicationAgent"
  variables:
    server:
      default: http://localhost
    port:
      default: "9091"
paths:
  /chat:
    post:
      summary: Send a chat message
      description: Processes an input chat message and returns a response.
      operationId: postChat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatReqMessage"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRespMessage"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorPayload"
components:
  schemas:
    ChatReqMessage:
      required:
      - sessionId
      - message
      type: object
      properties:
        sessionId:
          type: string
          description: Unique identifier for the chat session.
        message:
          type: string
          description: The user message sent to the chat service.
      additionalProperties: false
      description: Represents a request message for the chat service.
    ChatRespMessage:
      required:
      - message
      type: object
      properties:
        message:
          type: string
          description: Response message generated by the chat service.
      additionalProperties: false
      description: Represents a response message from the chat service.
    ErrorPayload:
      required:
      - timestamp
      - status
      - reason
      - message
      - path
      - method
      type: object
      properties:
        timestamp:
          type: string
          description: Time when the error occurred.
        status:
          type: integer
          description: HTTP status code associated with the error.
          format: int64
        reason:
          type: string
          description: Short reason for the error.
        message:
          type: string
          description: Detailed message describing the error.
        path:
          type: string
          description: Request path where the error occurred.
        method:
          type: string
          description: HTTP method used for the request.
      additionalProperties: false
      description: Represents a standard error payload.